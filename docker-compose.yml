services:
  postgres:
    image: postgres:16
    container_name: benefitbridge-postgres
    environment:
      POSTGRES_DB: benefitbridge
      POSTGRES_USER: benefitbridge_user
      POSTGRES_PASSWORD: benefitbridge_pass
    ports:
      - "5433:5432"
    volumes:
      - benefitbridge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benefitbridge_user -d benefitbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  benefitbridge_postgres_data: